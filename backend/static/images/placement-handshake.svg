<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Interview handshake illustration">
  <defs>
    <linearGradient id="darkBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="50%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="1200" height="700" fill="url(#darkBg)"/>
  <rect x="0" y="0" width="1200" height="90" fill="url(#accent)" opacity="0.25"/>

  <g opacity="0.35">
    <circle cx="120" cy="240" r="38" fill="#cbd5e1"/>
    <rect x="84" y="280" width="72" height="145" rx="30" fill="#94a3b8"/>

    <circle cx="240" cy="230" r="36" fill="#cbd5e1"/>
    <rect x="206" y="268" width="68" height="150" rx="28" fill="#64748b"/>

    <circle cx="350" cy="220" r="34" fill="#cbd5e1"/>
    <rect x="318" y="258" width="64" height="145" rx="26" fill="#475569"/>

    <circle cx="850" cy="230" r="36" fill="#cbd5e1"/>
    <rect x="816" y="268" width="68" height="150" rx="28" fill="#64748b"/>

    <circle cx="970" cy="225" r="35" fill="#cbd5e1"/>
    <rect x="936" y="262" width="68" height="150" rx="28" fill="#94a3b8"/>

    <circle cx="1085" cy="240" r="37" fill="#cbd5e1"/>
    <rect x="1049" y="278" width="72" height="146" rx="30" fill="#64748b"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="250" y="340" width="300" height="115" rx="58" fill="#1d4ed8" transform="rotate(-8 250 340)"/>
    <rect x="650" y="320" width="310" height="120" rx="60" fill="#e5e7eb" transform="rotate(9 650 320)"/>

    <rect x="510" y="320" width="170" height="90" rx="45" fill="#f1f5f9"/>
