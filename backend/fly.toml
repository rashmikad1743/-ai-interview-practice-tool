app = "ai-interview-practice-tool"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  DEBUG = "False"
  ALLOWED_HOSTS = ".fly.dev"
  MEDIA_ROOT = "/data/media"

[mounts]
  source = "media_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "20s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/"

[deploy]
  release_command = "python manage.py migrate"
